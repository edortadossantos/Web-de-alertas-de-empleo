<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8875ff"/>
      <stop offset="100%" stop-color="#4a35cc"/>
    </linearGradient>
    <linearGradient id="case" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ece9ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#2a1a80" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Fondo con esquinas redondeadas estilo iOS -->
  <rect width="512" height="512" rx="115" fill="url(#bg)"/>

  <!-- Brillo superior sutil -->
  <ellipse cx="256" cy="60" rx="200" ry="70" fill="white" opacity="0.08"/>

  <!-- Asa del maletín -->
  <path d="M 194 224 L 194 182 Q 194 148 256 148 Q 318 148 318 182 L 318 224"
        fill="none" stroke="white" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"
        filter="url(#shadow)"/>

  <!-- Cuerpo del maletín -->
  <rect x="106" y="224" width="300" height="210" rx="26" fill="url(#case)" filter="url(#shadow)"/>

  <!-- Banda horizontal central -->
  <rect x="106" y="300" width="300" height="30" fill="rgba(108,99,255,0.13)"/>

  <!-- Cierre central -->
  <rect x="232" y="284" width="48" height="62" rx="10" fill="#6c63ff"/>
  <rect x="244" y="304" width="24" height="4" rx="2" fill="rgba(255,255,255,0.6)"/>
  <circle cx="256" cy="318" r="7" fill="rgba(255,255,255,0.5)"/>

  <!-- Badge de notificación (alerta) -->
  <circle cx="368" cy="162" r="58" fill="#ff4d6d"/>
  <!-- Campana de alerta dentro del badge -->
  <path d="M 368 134
           Q 391 142 393 168
           L 396 186
           L 407 196
           L 329 196
           L 340 186
           L 343 168
           Q 345 142 368 134 Z"
        fill="white"/>
  <ellipse cx="368" cy="198" rx="12" ry="7" fill="white" opacity="0.3"/>
  <circle cx="368" cy="208" r="10" fill="white"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- OPCIÓN D: Maletín minimalista outline — fondo oscuro, líneas blancas y acento púrpura -->
  <defs>
    <linearGradient id="bgD" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14121f"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="accentD" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6c63ff"/>
      <stop offset="100%" stop-color="#43e8b0"/>
    </linearGradient>
    <filter id="glowD">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="115" fill="url(#bgD)"/>

  <!-- Halo de fondo -->
  <ellipse cx="256" cy="280" rx="200" ry="160" fill="#6c63ff" opacity="0.05"/>

  <!-- Asa del maletín — línea blanca -->
  <path d="M 193 225 L 193 183 Q 193 150 256 150 Q 319 150 319 183 L 319 225"
        fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="20" stroke-linecap="round"/>

  <!-- Cuerpo del maletín — outline -->
  <rect x="108" y="225" width="296" height="208" rx="24"
        fill="rgba(108,99,255,0.08)" stroke="rgba(255,255,255,0.75)" stroke-width="16"/>

  <!-- Banda central con gradiente acento -->
  <rect x="108" y="300" width="296" height="28" rx="0"
        fill="url(#accentD)" opacity="0.35"/>

  <!-- Hebilla central — círculo con brillo -->
  <circle cx="256" cy="314" r="24" fill="#0a0a0f" stroke="url(#accentD)" stroke-width="6" filter="url(#glowD)"/>
  <circle cx="256" cy="314" r="9" fill="url(#accentD)" filter="url(#glowD)"/>

  <!-- Estrella / chispa arriba derecha (alerta) -->
  <g transform="translate(370, 148) scale(0.9)" filter="url(#glowD)">
    <path d="M 0,-32 L 7,-10 L 30,-10 L 12,5 L 19,27 L 0,14 L -19,27 L -12,5 L -30,-10 L -7,-10 Z"
          fill="#43e8b0"/>
  </g>

  <!-- Pequeño destello rosa -->
  <circle cx="148" cy="165" r="7" fill="#ff6584" opacity="0.55"/>
</svg>
